<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,12 L12,6 z" fill="#2f3437"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #fbfaf7; }
      .title { font: 800 34px "Segoe UI", Arial, sans-serif; fill: #1f2528; }
      .subtitle { font: 500 18px "Segoe UI", Arial, sans-serif; fill: #687076; }
      .laneTitle { font: 800 20px "Segoe UI", Arial, sans-serif; fill: #2f3437; letter-spacing: .4px; }
      .boxTitle { font: 800 19px "Segoe UI", Arial, sans-serif; fill: #1f2528; }
      .boxText { font: 500 16px "Segoe UI", Arial, sans-serif; fill: #3f464a; }
      .decisionText { font: 800 16px "Segoe UI", Arial, sans-serif; fill: #15323d; }
      .small { font: 700 14px "Segoe UI", Arial, sans-serif; fill: #3f464a; }
      .label { font: 800 14px "Segoe UI", Arial, sans-serif; fill: #2f3437; }
      .note { font: 700 17px "Segoe UI", Arial, sans-serif; fill: #1f2528; }
      .lane { fill: #ffffff; stroke: #e5ddd1; stroke-width: 2; rx: 26; }
      .box { stroke: #30383c; stroke-width: 2.2; rx: 18; filter: url(#shadow); }
      .user { fill: #fff3d8; }
      .app { fill: #e5f5e9; }
      .backend { fill: #e8efff; }
      .external { fill: #f2e9ff; }
      .storage { fill: #fff0ec; }
      .decision { fill: #8fd8ef; stroke: #30383c; stroke-width: 2.2; filter: url(#shadow); }
      .arrow { stroke: #2f3437; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .arrowThin { stroke: #697177; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .labelBg { fill: #fbfaf7; stroke: #e5ddd1; stroke-width: 1; rx: 10; }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1200"/>

  <text x="900" y="54" text-anchor="middle" class="title">Блок-схема работы приложения FlavorFinder</text>
  <text x="900" y="84" text-anchor="middle" class="subtitle">Подбор рецептов по продуктам, просмотр инструкций, изображения шагов и избранное</text>

  <!-- Lanes -->
  <rect x="45" y="130" width="1710" height="170" class="lane"/>
  <text x="75" y="164" class="laneTitle">1. Пользователь</text>

  <rect x="45" y="330" width="1710" height="360" class="lane"/>
  <text x="75" y="364" class="laneTitle">2. Мобильное приложение React Native / Expo</text>

  <rect x="45" y="720" width="1710" height="220" class="lane"/>
  <text x="75" y="754" class="laneTitle">3. Backend Node.js</text>

  <rect x="45" y="970" width="1710" height="150" class="lane"/>
  <text x="75" y="1004" class="laneTitle">4. Внешние сервисы и локальное хранение</text>

  <!-- User lane -->
  <rect x="110" y="190" width="250" height="72" class="box user"/>
  <text x="235" y="219" text-anchor="middle" class="boxTitle">Запуск</text>
  <text x="235" y="244" text-anchor="middle" class="boxText">мобильного приложения</text>

  <rect x="465" y="190" width="270" height="72" class="box user"/>
  <text x="600" y="219" text-anchor="middle" class="boxTitle">Выбор действия</text>
  <text x="600" y="244" text-anchor="middle" class="boxText">главная / холодильник / избранное</text>

  <rect x="840" y="190" width="270" height="72" class="box user"/>
  <text x="975" y="219" text-anchor="middle" class="boxTitle">Ввод продуктов</text>
  <text x="975" y="244" text-anchor="middle" class="boxText">или выбор подсказок</text>

  <rect x="1215" y="190" width="270" height="72" class="box user"/>
  <text x="1350" y="219" text-anchor="middle" class="boxTitle">Открытие рецепта</text>
  <text x="1350" y="244" text-anchor="middle" class="boxText">просмотр шагов и фото</text>

  <path d="M360 226 L465 226" class="arrow"/>
  <path d="M735 226 L840 226" class="arrow"/>
  <path d="M1110 226 L1215 226" class="arrow"/>

  <!-- App lane top flow -->
  <rect x="110" y="410" width="250" height="82" class="box app"/>
  <text x="235" y="441" text-anchor="middle" class="boxTitle">Главный экран</text>
  <text x="235" y="466" text-anchor="middle" class="boxText">разнообразные рецепты</text>

  <polygon points="600,390 745,455 600,520 455,455" class="decision"/>
  <text x="600" y="449" text-anchor="middle" class="decisionText">Нужен подбор</text>
  <text x="600" y="471" text-anchor="middle" class="decisionText">по продуктам?</text>

  <rect x="840" y="410" width="270" height="82" class="box app"/>
  <text x="975" y="441" text-anchor="middle" class="boxTitle">Мой холодильник</text>
  <text x="975" y="466" text-anchor="middle" class="boxText">список выбранных продуктов</text>

  <rect x="1215" y="410" width="270" height="82" class="box app"/>
  <text x="1350" y="441" text-anchor="middle" class="boxTitle">Экран поиска</text>
  <text x="1350" y="466" text-anchor="middle" class="boxText">вывод найденных рецептов</text>

  <path d="M235 262 L235 410" class="arrow"/>
  <path d="M360 451 L455 455" class="arrow"/>
  <path d="M745 455 L840 451" class="arrow"/>
  <path d="M1110 451 L1215 451" class="arrow"/>
  <rect x="770" y="427" width="58" height="25" class="labelBg"/>
  <text x="799" y="445" text-anchor="middle" class="label">да</text>

  <path d="M600 520 L600 585 L1215 585" class="arrowThin"/>
  <path d="M1215 585 L1215 492" class="arrowThin"/>
  <rect x="610" y="550" width="62" height="25" class="labelBg"/>
  <text x="641" y="568" text-anchor="middle" class="label">нет</text>

  <!-- App lane second row -->
  <polygon points="340,555 485,620 340,685 195,620" class="decision"/>
  <text x="340" y="614" text-anchor="middle" class="decisionText">Рецепт есть</text>
  <text x="340" y="636" text-anchor="middle" class="decisionText">локально?</text>

  <rect x="570" y="580" width="285" height="82" class="box app"/>
  <text x="712" y="611" text-anchor="middle" class="boxTitle">Локальная база</text>
  <text x="712" y="636" text-anchor="middle" class="boxText">15 рецептов Food.ru</text>

  <rect x="950" y="580" width="285" height="82" class="box app"/>
  <text x="1092" y="611" text-anchor="middle" class="boxTitle">Карточки рецептов</text>
  <text x="1092" y="636" text-anchor="middle" class="boxText">фильтр и сортировка через «...»</text>

  <rect x="1325" y="580" width="285" height="82" class="box app"/>
  <text x="1468" y="611" text-anchor="middle" class="boxTitle">Детали рецепта</text>
  <text x="1468" y="636" text-anchor="middle" class="boxText">ингредиенты, шаги, фото</text>

  <path d="M1215 492 L340 555" class="arrowThin"/>
  <path d="M485 620 L570 620" class="arrow"/>
  <rect x="510" y="594" width="58" height="25" class="labelBg"/>
  <text x="539" y="612" text-anchor="middle" class="label">да</text>
  <path d="M855 620 L950 620" class="arrow"/>
  <path d="M1235 620 L1325 620" class="arrow"/>

  <!-- Backend lane -->
  <rect x="175" y="790" width="300" height="82" class="box backend"/>
  <text x="325" y="821" text-anchor="middle" class="boxTitle">Запрос к backend</text>
  <text x="325" y="846" text-anchor="middle" class="boxText">если локально не найдено</text>

  <rect x="575" y="790" width="300" height="82" class="box backend"/>
  <text x="725" y="821" text-anchor="middle" class="boxTitle">Обработка запроса</text>
  <text x="725" y="846" text-anchor="middle" class="boxText">перевод RU → EN, валидация</text>

  <rect x="975" y="790" width="300" height="82" class="box backend"/>
  <text x="1125" y="821" text-anchor="middle" class="boxTitle">Получение данных</text>
  <text x="1125" y="846" text-anchor="middle" class="boxText">рецепты, советы, изображения</text>

  <path d="M340 685 L325 790" class="arrow"/>
  <rect x="330" y="724" width="62" height="25" class="labelBg"/>
  <text x="361" y="742" text-anchor="middle" class="label">нет</text>
  <path d="M475 831 L575 831" class="arrow"/>
  <path d="M875 831 L975 831" class="arrow"/>
  <path d="M1125 790 L1125 662" class="arrow"/>

  <!-- External lane -->
  <rect x="175" y="1035" width="280" height="70" class="box external"/>
  <text x="315" y="1062" text-anchor="middle" class="boxTitle">Spoonacular API</text>
  <text x="315" y="1086" text-anchor="middle" class="boxText">поиск рецептов</text>

  <rect x="565" y="1035" width="280" height="70" class="box external"/>
  <text x="705" y="1062" text-anchor="middle" class="boxTitle">OpenAI API</text>
  <text x="705" y="1086" text-anchor="middle" class="boxText">генерация и перевод</text>

  <rect x="955" y="1035" width="280" height="70" class="box external"/>
  <text x="1095" y="1062" text-anchor="middle" class="boxTitle">OpenAI Images / DeepAI</text>
  <text x="1095" y="1086" text-anchor="middle" class="boxText">изображения шагов</text>

  <rect x="1345" y="1035" width="280" height="70" class="box storage"/>
  <text x="1485" y="1062" text-anchor="middle" class="boxTitle">AsyncStorage</text>
  <text x="1485" y="1086" text-anchor="middle" class="boxText">избранное, тема, кэш</text>

  <path d="M650 872 L315 1035" class="arrowThin"/>
  <path d="M725 872 L705 1035" class="arrowThin"/>
  <path d="M1125 872 L1095 1035" class="arrowThin"/>
  <path d="M1468 662 L1485 1035" class="arrowThin"/>

  <!-- Image decision inside details -->
  <polygon points="1618,540 1710,585 1618,630 1526,585" class="decision"/>
  <text x="1618" y="580" text-anchor="middle" class="decisionText">Фото есть</text>
  <text x="1618" y="600" text-anchor="middle" class="decisionText">в Food.ru?</text>
  <path d="M1610 620 L1610 662 L1468 662" class="arrowThin"/>
  <rect x="1620" y="637" width="58" height="25" class="labelBg"/>
  <text x="1649" y="655" text-anchor="middle" class="label">да</text>
  <path d="M1710 585 L1740 585 L1740 1035 L1235 1070" class="arrowThin"/>
  <rect x="1722" y="600" width="62" height="25" class="labelBg"/>
  <text x="1753" y="618" text-anchor="middle" class="label">нет</text>

  <text x="900" y="1158" text-anchor="middle" class="note">
    Стек: TypeScript, React Native, Expo, Node.js backend, Spoonacular API, OpenAI API, DeepAI, Food.ru CDN, AsyncStorage
  </text>
</svg>
